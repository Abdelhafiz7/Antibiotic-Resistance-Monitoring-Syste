name: antibiotic_monitor
description: Arduino-based Antibiotic Resistance Monitoring System for BLE data visualization.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.3
  permission_handler: ^11.3.1
  provider: ^6.1.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true